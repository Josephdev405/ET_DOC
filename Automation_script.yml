name: Run My Daily Script

# authors: ChatGPT and Joseph Harris
# If you are just copying and pasting this code, make sure you read through the text after the # sign, you will have to replace some text to personalize it to your script
# 1. THE TRIGGER: When should this run?
on:
  schedule:
    # This syntax means: Run every day at 12:00 PM UTC (7:00 AM EST) make sure you do this at the time you want. GitHub
    # will send you an email if it does not work, so make sure it is not in the middle of the night for you! Just look up what the time you want in cron notation online
    - cron: '0 12 * * *'
  workflow_dispatch: # This adds a manual "Play" button on GitHub so you can test it anytime!



# 2. THE RUNNER: What steps should the cloud computer take?
jobs:
  run-my-script-job:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your repository files onto the cloud machine
    - name: Check out repo code
      uses: actions/checkout@v4

    # Step 2: Install Python on the cloud machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    
      

    # Step 3: Install any external packages your script needs
    - name: Install dependencies
      run: |
        pip install requests pandas pymongo # Add any packages your script uses here (like pandas, selenium, etc.)

    # Step 4: Run your actual file
    # YOU MUST REPLACE THE TEXT AFTER "secrets." WITH THE NAMES OF THE KEYS IN GITHUB SECRETS
    - name: Execute script
      env:
        OPEN_ET_KEY: ${{ secrets.YOUR_OPEN_ET_KEY_MUST_BE_SAME_NAME_AS_IT_IS_IN_GITHUB_SECRETS }}
        MDB_STRING: ${{ secrets.YOUR_MDB_CONNECTION_STRING_MUST_BE_SAME_NAME_AS_IT_IS_IN_GITHUB_SECRETS }}
      run: python NAME_OF_YOUR_PYTHON_SCRIPT.py  # YOU MUST REPLACE THIS NAME WITH THE NAME OF YOUR ACTUAL SCRIPT. MAKE SURE TO NOT DELETE THE "python" AT THE BEGINNING!

